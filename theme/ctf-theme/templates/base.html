<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cyber CTF{% endblock %}</title>

  <!-- Bootstrap 5 dark -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('views.themes', path='ctf-theme/static/css/style.css') }}">

  {% block head %}{% endblock %}
</head>
<body data-bs-theme="dark">
  <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1e293b;">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🛡️ Cyber CTF</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          {% if authed() %}
          <li class="nav-item"><a class="nav-link" href="/challenges">Challenges</a></li>
          <li class="nav-item"><a class="nav-link" href="/scoreboard">Scoreboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/team">My Team</a></li>
          <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
          {% else %}
          <li class="nav-item"><a class="nav-link" href="/join">Join</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-3">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-secondary py-3" style="font-size:.85rem;">
    Beginner Cyber CTF
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
