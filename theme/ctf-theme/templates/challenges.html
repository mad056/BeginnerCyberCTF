{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h2 class="text-center mb-4">Challenges</h2>
  <div class="row g-3" id="challenge-board">
    {% for challenge in challenges %}
    <div class="col-sm-6 col-md-4">
      <div class="card h-100 bg-dark border-secondary challenge-card"
           data-bs-toggle="modal" data-bs-target="#chalModal"
           data-id="{{ challenge.id }}" style="cursor:pointer;">
        <div class="card-body text-center">
          <h5 class="card-title">{{ challenge.name }}</h5>
          <span class="badge bg-primary">{{ challenge.value }} pts</span>
          {% if challenge.id in solves %}
          <span class="badge bg-success ms-1">✓ Solved</span>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Challenge modal -->
<div class="modal fade" id="chalModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="chalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="chalDesc" class="mb-3"></div>
        <div id="chalFiles" class="mb-3"></div>
        <div id="chalHints" class="mb-3"></div>
        <form id="chalForm" class="d-flex gap-2">
          <input type="hidden" id="chalId">
          <input type="text" class="form-control" id="chalFlag" placeholder="flag{...}" autocomplete="off">
          <button class="btn btn-primary" type="submit">Submit</button>
        </form>
        <div id="chalResult" class="mt-2"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const modal = document.getElementById('chalModal');
modal.addEventListener('show.bs.modal', async function(e) {
  const id = e.relatedTarget.dataset.id;
  document.getElementById('chalId').value = id;
  document.getElementById('chalResult').innerHTML = '';
  const data = await fetch(`/api/v1/challenges/${id}`).then(r => r.json());
  const ch = data.data;
  document.getElementById('chalTitle').textContent = ch.name + ' (' + ch.value + ' pts)';
  document.getElementById('chalDesc').innerHTML = ch.description;

  // files
  const filesDiv = document.getElementById('chalFiles');
  filesDiv.innerHTML = '';
  if (ch.files && ch.files.length) {
    ch.files.forEach(f => {
      const a = document.createElement('a');
      a.href = f;
      a.className = 'btn btn-sm btn-outline-secondary me-1';
      a.textContent = '📎 ' + f.split('/').pop().split('?')[0];
      a.target = '_blank';
      filesDiv.appendChild(a);
    });
  }

  // hints
  const hintsDiv = document.getElementById('chalHints');
  hintsDiv.innerHTML = '';
  if (ch.hints && ch.hints.length) {
    ch.hints.forEach(h => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm btn-outline-warning me-1';
      btn.textContent = h.content ? '💡 ' + h.content : '💡 Reveal hint (' + (h.cost || 'free') + ' pts)';
      if (!h.content) {
        btn.onclick = async () => {
          const res = await fetch(`/api/v1/hints/${h.id}`, {
            method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
          }).then(r => r.json());
          if (res.data && res.data.content) btn.textContent = '💡 ' + res.data.content;
        };
      }
      hintsDiv.appendChild(btn);
    });
  }
});

document.getElementById('chalForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const id = document.getElementById('chalId').value;
  const flag = document.getElementById('chalFlag').value;
  const res = await fetch(`/api/v1/challenges/attempt`, {
    method: 'POST',
    headers: {'Content-Type':'application/json', 'CSRF-Token': init.csrfNonce},
    body: JSON.stringify({challenge_id: parseInt(id), submission: flag}),
  }).then(r => r.json());
  const el = document.getElementById('chalResult');
  if (res.data && res.data.status === 'correct') {
    el.innerHTML = '<div class="alert alert-success">✅ Correct!</div>';
  } else if (res.data && res.data.status === 'already_solved') {
    el.innerHTML = '<div class="alert alert-info">Already solved.</div>';
  } else {
    el.innerHTML = '<div class="alert alert-danger">❌ Wrong flag, try again.</div>';
  }
});
</script>
{% endblock %}
