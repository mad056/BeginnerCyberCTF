<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the CTF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: .25rem;
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-size: .95rem;
    }
    label {
      display: block;
      margin-bottom: .35rem;
      font-weight: 600;
      font-size: .9rem;
    }
    input, select {
      width: 100%;
      padding: .65rem .75rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.3);
    }
    .error {
      background: #7f1d1d;
      color: #fca5a5;
      padding: .6rem .75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
    button {
      width: 100%;
      padding: .75rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛡️ Cyber CTF</h1>
    <p class="subtitle">Enter the event password, pick a name, and type your team name.<br>If the team doesn't exist yet it will be created automatically.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/join" autocomplete="off">
      <label for="event_password">Event Password</label>
      <input type="password" id="event_password" name="event_password" required>

      <label for="display_name">Your Display Name</label>
      <input type="text" id="display_name" name="display_name" maxlength="64" required
             placeholder="e.g. Alex S">

      <label for="team_name">Team Name</label>
      <input type="text" id="team_name" name="team_name" maxlength="64" required
             placeholder="e.g. The Hackers — shared with your teammates">

      <button type="submit">Join &amp; Start</button>
    </form>
  </div>
</body>
</html>
